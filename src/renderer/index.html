<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline';" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <!-- Only #pet-zone captures the mouse; everything else is click-through. -->
    <div id="stage">
      <div id="bubble" class="hidden">
        <span id="bubble-text"></span>
        <span id="bubble-link" class="bubble-link hidden" role="button" tabindex="0"></span>
      </div>

      <div id="pet-zone">
        <div id="pet" class="mood-idle">
          <div class="shadow"></div>
          <div id="ai-badges" class="ai-badges hidden" aria-hidden="true"></div>
          <!-- floating hearts / sparkles spawn here (pointer-events: none) -->
          <div id="particles" class="particles" aria-hidden="true"></div>
          <!-- little leaf sprout on top, with a flower bud that blooms when happy -->
          <div class="sprout" aria-hidden="true">
            <span class="leaf left"></span>
            <span class="leaf right"></span>
            <span class="flower">
              <span class="petal"></span><span class="petal"></span>
              <span class="petal"></span><span class="petal"></span>
              <span class="petal"></span>
              <span class="flower-core"></span>
            </span>
          </div>
          <!-- party hat, only shown when the pet is showered with affection -->
          <div class="hat" aria-hidden="true"><span class="pom"></span></div>
          <!-- cat ears (only shown for skin-cat) -->
          <div class="ear left" aria-hidden="true"></div>
          <div class="ear right" aria-hidden="true"></div>
          <!-- bunny ears (only shown for skin-bunny) -->
          <div class="bunny-ear left" aria-hidden="true"></div>
          <div class="bunny-ear right" aria-hidden="true"></div>
          <!-- unlockable cosmetics: revealed by cosmetic-* classes -->
          <div class="crown" aria-hidden="true"></div>
          <div class="glasses" aria-hidden="true"><span class="lens left"></span><span class="lens right"></span></div>
          <div class="scarf" aria-hidden="true"><span class="tail"></span></div>
          <div class="headphones" aria-hidden="true"><span class="cup left"></span><span class="cup right"></span></div>
          <!-- little stubby feet (behind the body) -->
          <div class="foot left" aria-hidden="true"></div>
          <div class="foot right" aria-hidden="true"></div>
          <!-- Optional sprite-sheet layer. Hidden unless a sprite is configured
               in Settings; when active it replaces the CSS-drawn character art
               (body + limbs + skin decorations) frame-by-frame, keyed off the
               same mood-* classes. See "Swapping in real art" in the README. -->
          <div class="sprite" aria-hidden="true"></div>
          <div class="body">
            <div class="shine"></div>
            <div class="eye left"><span class="pupil"></span></div>
            <div class="eye right"><span class="pupil"></span></div>
            <div class="mouth"></div>
            <div class="blush left"></div>
            <div class="blush right"></div>
          </div>
          <!-- pulsing ring around the pet body while an AI is working/thinking -->
          <div class="ai-ring" aria-hidden="true"></div>
          <!-- focus-mode headphones — independent of the cosmetic system -->
          <div class="focus-phones" aria-hidden="true"><span class="cup left"></span><span class="cup right"></span></div>
          <!-- little arms that wave while working / being petted -->
          <div class="arm left" aria-hidden="true"></div>
          <div class="arm right" aria-hidden="true"></div>
          <div class="zzz">z<span>z</span><span>z</span></div>
          <!-- cozy sleeping blanket — only visible in mood-sleeping -->
          <div class="blanket" aria-hidden="true"><span class="blanket-fold"></span></div>
        </div>
      </div>

      <!-- context-usage slider: a thin bar below the pet that fills as the
           conversation's context window grows -->
      <div id="ctx-bar" class="ctx-bar hidden" aria-hidden="true">
        <div class="ctx-bar-track"><div class="ctx-bar-fill"></div></div>
        <span id="ctx-bar-label" class="ctx-bar-label hidden"></span>
      </div>

      <!-- daily activity summary: tasks done + errors today (hidden until > 0) -->
      <div id="daily-bar" class="daily-bar hidden" aria-hidden="true">
        <span id="daily-count"></span>
      </div>
    </div>

    <script src="pet.js"></script>
  </body>
</html>
